name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.3)'
        required: true
        type: string
      desktop_artifacts_only:
        description: 'Build Linux and Windows workflow artifacts without publishing a release'
        required: false
        default: false
        type: boolean

concurrency:
  group: release
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Gate: analyze, test, resolve version/prev-tag ─────────────────────────
  validate:
    name: Validate & Test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
      prev_tag: ${{ steps.version.outputs.prev_tag }}
    defaults:
      run:
        working-directory: flutter_client
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"
          BUILD_NUMBER="${{ github.run_number }}"
          PREV_TAG=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -v "^${TAG}$" \
            | head -1 || echo "")
          echo "version=$VERSION"           >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "prev_tag=$PREV_TAG"         >> $GITHUB_OUTPUT
          echo "Building v$VERSION (build $BUILD_NUMBER) - prev: ${PREV_TAG:-none}"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  # ── Android phone + Android TV (single APK, leanback optional) ────────────
  build-android:
    name: Build Android APK
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.desktop_artifacts_only != true }}
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: flutter_client
    steps:
      - uses: actions/checkout@v7

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Test native Android code
        run: ./android/gradlew -p android :app:testDebugUnitTest

      - name: Set version
        run: |
          sed -i "s/^version: .*/version: ${{ needs.validate.outputs.version }}+${{ needs.validate.outputs.build_number }}/" pubspec.yaml

      - name: Validate and decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for name in KEYSTORE_B64 ANDROID_KEY_ALIAS ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "ERROR: Required Android signing secret $name is missing or empty."
              exit 1
            fi
          done
          printf '%s' "$KEYSTORE_B64" | base64 --decode > upload-keystore.jks
          test -s upload-keystore.jks

      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=TRAKT_CLIENT_ID=${{ secrets.TRAKT_CLIENT_ID }} \
            --dart-define=TRAKT_CLIENT_SECRET=${{ secrets.TRAKT_CLIENT_SECRET }}
        env:
          ANDROID_KEYSTORE_PATH: ../../upload-keystore.jks
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_REQUIRE_RELEASE_SIGNING: "true"

      - name: Verify APK signer
        run: |
          set -euo pipefail
          APK="build/app/outputs/flutter-apk/app-release.apk"
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -1)
          if [ -z "$APKSIGNER" ]; then
            echo "ERROR: apksigner was not found in the Android SDK build-tools."
            exit 1
          fi
          SIGNER_INFO=$("$APKSIGNER" verify --verbose --print-certs "$APK")
          printf '%s\n' "$SIGNER_INFO"
          SIGNER_SHA256=$(printf '%s\n' "$SIGNER_INFO" \
            | sed -n 's/^Signer #1 certificate SHA-256 digest: //p' \
            | head -1)
          if [ -z "$SIGNER_SHA256" ]; then
            echo "ERROR: APK signer SHA-256 digest could not be determined."
            exit 1
          fi
          if printf '%s\n' "$SIGNER_INFO" | grep -qi 'Android Debug'; then
            echo "ERROR: Refusing to publish an APK signed with an Android Debug certificate."
            exit 1
          fi
          {
            echo "### Android APK signing"
            echo "- Signer certificate SHA-256: \`$SIGNER_SHA256\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stage artifact
        run: |
          APK="m3u-tv-v${{ needs.validate.outputs.version }}-android.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "$APK"
          sha256sum "$APK" > "$APK.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: |
            flutter_client/m3u-tv-v${{ needs.validate.outputs.version }}-android.apk
            flutter_client/m3u-tv-v${{ needs.validate.outputs.version }}-android.apk.sha256

  # ── iOS (unsigned IPA - sideload via AltStore / TestFlight with Apple certs) ──
  #
  # To enable signed distribution add secrets and uncomment the certificate
  # install step (same pattern as the tvOS job below).
  # ─────────────────────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS IPA
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.desktop_artifacts_only != true }}
    runs-on: macos-latest
    needs: validate
    defaults:
      run:
        working-directory: flutter_client
    steps:
      - uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Set version
        run: |
          sed -i '' "s/^version: .*/version: ${{ needs.validate.outputs.version }}+${{ needs.validate.outputs.build_number }}/" pubspec.yaml

      - name: Build iOS IPA (unsigned)
        run: |
          flutter build ipa --release --no-codesign \
            --dart-define=TRAKT_CLIENT_ID=${{ secrets.TRAKT_CLIENT_ID }} \
            --dart-define=TRAKT_CLIENT_SECRET=${{ secrets.TRAKT_CLIENT_SECRET }}

      - name: Stage artifact
        # flutter build ipa --no-codesign creates an xcarchive, not a Payload IPA.
        # The .app is inside the xcarchive; we package it manually into a Payload zip.
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          APP="build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app"
          if [ ! -d "$APP" ]; then
            echo "ERROR: Runner.app not found at expected xcarchive path - listing build/ios/:"
            find build/ios -name "*.app" | head -10
            find build/ios -name "*.xcarchive" | head -5
            exit 1
          fi
          mkdir -p build/ios/Payload
          cp -r "$APP" build/ios/Payload/Runner.app
          (cd build/ios && zip -qr "../../m3u-tv-v${VERSION}-ios.ipa" Payload/)
          IPA="m3u-tv-v${VERSION}-ios.ipa"
          shasum -a 256 "$IPA" > "$IPA.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: ios-ipa
          path: |
            flutter_client/m3u-tv-v${{ needs.validate.outputs.version }}-ios.ipa
            flutter_client/m3u-tv-v${{ needs.validate.outputs.version }}-ios.ipa.sha256

  # ── Apple TV / tvOS ───────────────────────────────────────────────────────
  #
  # The tvOS Xcode project uses manual copy-phases for Flutter artifacts
  # rather than the standard Flutter backend build phase, so CI pre-builds
  # the Flutter bundle and stages it before archiving with xcodebuild.
  #
  # To enable signed/TestFlight distribution uncomment the certificate step
  # below and add these secrets:
#   APPLE_CERTIFICATE_BASE64       - p12 (base64)
#   APPLE_CERTIFICATE_PASSWORD     - p12 password
#   APPLE_PROVISIONING_PROFILE_B64 - .mobileprovision (base64)
  # ─────────────────────────────────────────────────────────────────────────
  build-tvos:
    name: Build tvOS IPA
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.desktop_artifacts_only != true }}
    runs-on: macos-latest
    needs: validate
    defaults:
      run:
        working-directory: flutter_client
    steps:
      - uses: actions/checkout@v7

      - name: Install flutter-tvos
        # flutter-tvos is a companion CLI (github.com/fluttertv/flutter-tvos) that
        # provides the tvOS Flutter engine and build toolchain. It is separate from
        # the standard Flutter SDK and must be installed before building tvOS targets.
        run: |
          git clone --depth 1 --branch v3.44.2-tvos.1.3.1 \
            https://github.com/fluttertv/flutter-tvos.git $HOME/flutter-tvos
          echo "$HOME/flutter-tvos/bin" >> $GITHUB_PATH

      - name: Precache tvOS engine artifacts
        run: flutter-tvos precache

      - name: Get dependencies
        run: flutter-tvos pub get

      - name: Set version
        run: |
          sed -i '' "s/^version: .*/version: ${{ needs.validate.outputs.version }}+${{ needs.validate.outputs.build_number }}/" pubspec.yaml

      # Uncomment to enable signed builds (add secrets listed in the job comment above):
      # - name: Install Apple certificate & provisioning profile
      #   env:
      #     CERT_B64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      #     CERT_PWD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      #     PROFILE_B64: ${{ secrets.APPLE_PROVISIONING_PROFILE_B64 }}
      #   run: |
      #     KC=$RUNNER_TEMP/build.keychain
      #     security create-keychain -p "" $KC
      #     security set-keychain-settings -lut 21600 $KC
      #     security unlock-keychain -p "" $KC
      #     echo "$CERT_B64" | base64 --decode -o $RUNNER_TEMP/cert.p12
      #     security import $RUNNER_TEMP/cert.p12 -P "$CERT_PWD" -A -t cert -f pkcs12 -k $KC
      #     security list-keychain -d user -s $KC
      #     PP=$RUNNER_TEMP/profile.mobileprovision
      #     echo "$PROFILE_B64" | base64 --decode -o "$PP"
      #     mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
      #     cp "$PP" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Disable code signing in tvOS project
        # flutter-tvos ignores FLUTTER_XCODE_* env vars for signing. Clear all
        # signing-related build settings so xcodebuild doesn't search for profiles.
        # SDK-conditional keys ("KEY[sdk=appletvos*]") take precedence over their
        # base equivalents when building for physical tvOS hardware, so both must
        # be cleared. Use [^;]* (not [A-Z0-9]*) to avoid zero-length matches that
        # double-quote an already-empty value and corrupt the pbxproj plist.
        # CODE_SIGN_STYLE must be set to Manual (not just clearing DEVELOPMENT_TEAM)
        # because Automatic signing contacts Apple servers to generate profiles even
        # with an empty team, which fails in CI with "no devices" error.
        run: |
          sed -i '' \
            -e 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' \
            -e 's/DEVELOPMENT_TEAM = [^;]*/DEVELOPMENT_TEAM = ""/g' \
            -e 's/"DEVELOPMENT_TEAM\[sdk=appletvos\*\]" = [^;]*/"DEVELOPMENT_TEAM[sdk=appletvos*]" = ""/g' \
            -e 's/PROVISIONING_PROFILE_SPECIFIER = [^;]*/PROVISIONING_PROFILE_SPECIFIER = ""/g' \
            -e 's/"PROVISIONING_PROFILE_SPECIFIER\[sdk=appletvos\*\]" = [^;]*/"PROVISIONING_PROFILE_SPECIFIER[sdk=appletvos*]" = ""/g' \
            -e 's/CODE_SIGN_IDENTITY = "Apple Development"/CODE_SIGN_IDENTITY = ""/g' \
            -e 's/"CODE_SIGN_IDENTITY\[sdk=appletvos\*\]" = [^;]*/"CODE_SIGN_IDENTITY[sdk=appletvos*]" = ""/g' \
            tvos/Runner.xcodeproj/project.pbxproj

      - name: Build tvOS (unsigned)
        run: |
          flutter-tvos build tvos --release \
            --dart-define=TRAKT_CLIENT_ID=${{ secrets.TRAKT_CLIENT_ID }} \
            --dart-define=TRAKT_CLIENT_SECRET=${{ secrets.TRAKT_CLIENT_SECRET }}

      - name: Package IPA
        # flutter-tvos build tvos creates an xcarchive; package the .app manually.
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          APP=$(find build/tvos -name "Runner.app" | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: Runner.app not found - listing build/tvos/:"
            find build/tvos -name "*.app" -o -name "*.xcarchive" || true
            exit 1
          fi
          mkdir -p build/tvos/Payload
          cp -r "$APP" build/tvos/Payload/Runner.app
          (cd build/tvos && zip -qr \
            "../../m3u-tv-v${VERSION}-tvos.ipa" Payload/)
          IPA="m3u-tv-v${VERSION}-tvos.ipa"
          shasum -a 256 "$IPA" > "$IPA.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: tvos-ipa
          path: |
            flutter_client/m3u-tv-v${{ needs.validate.outputs.version }}-tvos.ipa
            flutter_client/m3u-tv-v${{ needs.validate.outputs.version }}-tvos.ipa.sha256

  # ── macOS ─────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS DMG
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.desktop_artifacts_only != true }}
    runs-on: macos-latest
    needs: validate
    defaults:
      run:
        working-directory: flutter_client
    steps:
      - uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Set version
        run: |
          sed -i '' "s/^version: .*/version: ${{ needs.validate.outputs.version }}+${{ needs.validate.outputs.build_number }}/" pubspec.yaml

      - name: Install signing certificate
        env:
          CERT_B64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERT_PWD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KC="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "" "$KC"
          echo "$CERT_B64" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERT_PWD" -A -t cert -f pkcs12 -k "$KC"
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | xargs)
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KC"

      - name: Set up App Store Connect API key
        env:
          API_KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_B64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_B64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

      - name: Install CocoaPods dependencies
        run: cd macos && pod install --repo-update

      - name: Build macOS app (unsigned)
        # Sign separately after build so we control the identity and entitlements.
        env:
          FLUTTER_XCODE_CODE_SIGN_IDENTITY: ""
          FLUTTER_XCODE_CODE_SIGNING_REQUIRED: "NO"
          FLUTTER_XCODE_CODE_SIGNING_ALLOWED: "NO"
          FLUTTER_XCODE_DEVELOPMENT_TEAM: ""
        run: |
          flutter build macos --release \
            --dart-define=TRAKT_CLIENT_ID=${{ secrets.TRAKT_CLIENT_ID }} \
            --dart-define=TRAKT_CLIENT_SECRET=${{ secrets.TRAKT_CLIENT_SECRET }}

      - name: Sign app bundle
        # Notarization requires: Developer ID Application cert, Hardened Runtime
        # (--options runtime), and a secure timestamp (--timestamp).
        # Sign inside-out: dylibs and framework bundles first, then the .app.
        # codesign --deep is unreliable for complex bundles with many frameworks.
        run: |
          APP=$(find build/macos -name "*.app" -path "*/Release/*" | head -1)
          IDENTITY=$(security find-identity -v -p codesigning \
            | grep "Developer ID Application" \
            | grep -o '"[^"]*"' | head -1 | tr -d '"')
          if [ -z "$IDENTITY" ]; then
            echo "ERROR: No 'Developer ID Application' certificate found."
            echo "Available identities:"
            security find-identity -v -p codesigning
            exit 1
          fi
          echo "Signing with: $IDENTITY"
          # Sign all dylibs
          find "$APP" -name "*.dylib" | while read f; do
            codesign --force --options runtime --timestamp --sign "$IDENTITY" "$f"
          done
          # Sign framework bundles inside-out (deepest paths first)
          find "$APP" -name "*.framework" | sort -r | while read fw; do
            codesign --force --options runtime --timestamp --sign "$IDENTITY" "$fw"
          done
          # Finally sign the .app with entitlements
          codesign --force --options runtime --timestamp \
            --sign "$IDENTITY" \
            --entitlements macos/Runner/Release.entitlements \
            "$APP"
          codesign --verify --verbose "$APP"

      - name: Package as DMG
        run: |
          APP=$(find build/macos -name "*.app" -path "*/Release/*" | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: .app not found - listing build/macos/:"
            find build/macos -name "*.app" | head -10
            exit 1
          fi
          hdiutil create \
            -volname "M3U TV" \
            -srcfolder "$APP" \
            -ov -format UDZO \
            "m3u-tv-v${{ needs.validate.outputs.version }}-macos.dmg"

      - name: Notarize DMG
        run: |
          KEY=~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8
          RESULT=$(xcrun notarytool submit \
            "m3u-tv-v${{ needs.validate.outputs.version }}-macos.dmg" \
            --key "$KEY" \
            --key-id ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }} \
            --issuer ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }} \
            --wait --output-format json)
          STATUS=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          ID=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization status: $STATUS - fetching Apple rejection log:"
            xcrun notarytool log "$ID" \
              --key "$KEY" \
              --key-id ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }} \
              --issuer ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
            exit 1
          fi

      - name: Staple notarization ticket
        run: |
          DMG="m3u-tv-v${{ needs.validate.outputs.version }}-macos.dmg"
          xcrun stapler staple "$DMG"
          shasum -a 256 "$DMG" > "$DMG.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: |
            flutter_client/m3u-tv-v${{ needs.validate.outputs.version }}-macos.dmg
            flutter_client/m3u-tv-v${{ needs.validate.outputs.version }}-macos.dmg.sha256

  # ── Linux ─────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux ZIP
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: flutter_client
    steps:
      - uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libmpv-dev \
            libsecret-1-dev libjsoncpp-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Set version
        run: |
          sed -i "s/^version: .*/version: ${{ needs.validate.outputs.version }}+${{ needs.validate.outputs.build_number }}/" pubspec.yaml

      - name: Build Linux app
        run: |
          flutter build linux --release \
            --dart-define=TRAKT_CLIENT_ID=${{ secrets.TRAKT_CLIENT_ID }} \
            --dart-define=TRAKT_CLIENT_SECRET=${{ secrets.TRAKT_CLIENT_SECRET }}

      - name: Verify Linux bundle
        run: |
          BUNDLE="build/linux/x64/release/bundle"
          test -x "$BUNDLE/m3u_tv"
          test -s "$BUNDLE/lib/libflutter_linux_gtk.so"
          test -s "$BUNDLE/lib/libmpv.so.2"
          test -s "$BUNDLE/lib/libmedia_kit_video_plugin.so"
          test -s "$BUNDLE/data/icudtl.dat"
          test -d "$BUNDLE/data/flutter_assets"
          readelf -d "$BUNDLE/m3u_tv"
          readelf -d "$BUNDLE/lib/libmedia_kit_video_plugin.so" \
            > /tmp/m3u-tv-media-kit-video-dynamic.txt
          grep -F 'Library runpath: [$ORIGIN]' \
            /tmp/m3u-tv-media-kit-video-dynamic.txt
          if ldd "$BUNDLE/m3u_tv" | tee /tmp/m3u-tv-ldd.txt | grep -q 'not found'; then
            cat /tmp/m3u-tv-ldd.txt
            exit 1
          fi

          # Explicit allowlist of intentional system dependencies. Libraries
          # resolved from inside the bundle (media_kit, libmpv, the Flutter
          # engine) are already covered by the checks above and are exempt.
          # Anything else must be a known, reviewed system dependency of the
          # GTK/X11/glibc stack this app links against - add new entries here
          # deliberately, not to silence a failure.
          ALLOWED_SYSTEM_LIBS=(
            'linux-vdso.so.1' 'ld-linux-x86-64.so.2'
            'libc.so.6' 'libm.so.6' 'libpthread.so.0' 'libdl.so.2' 'librt.so.1'
            'libgcc_s.so.1' 'libstdc++.so.6'
            'libgtk-3.so.0' 'libgdk-3.so.0' 'libgio-2.0.so.0' 'libglib-2.0.so.0'
            'libgobject-2.0.so.0' 'libgmodule-2.0.so.0'
            'libpango-1.0.so.0' 'libpangocairo-1.0.so.0'
            'libcairo.so.2' 'libcairo-gobject.so.2' 'libgdk_pixbuf-2.0.so.0'
            'libatk-1.0.so.0' 'libatk-bridge-2.0.so.0' 'libepoxy.so.0'
            'libX11.so.6' 'libXext.so.6' 'libXi.so.6' 'libXcursor.so.1'
            'libXdamage.so.1' 'libXfixes.so.3' 'libXcomposite.so.1'
            'libXrandr.so.2' 'libXrender.so.1' 'libXinerama.so.1' 'libXtst.so.6'
            'libsecret-1.so.0' 'libjsoncpp.so.26' 'liblzma.so.5'
            'libselinux.so.1' 'libmount.so.1' 'libblkid.so.1' 'libpcre2-8.so.0'
            'libffi.so.8' 'libz.so.1' 'libbz2.so.1.0' 'libexpat.so.1'
            'libuuid.so.1' 'libgpg-error.so.0' 'libp11-kit.so.0'
          )
          UNEXPECTED=()
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            if printf '%s' "$line" | grep -q '/bundle/lib/'; then
              continue
            fi
            LIBNAME=$(printf '%s' "$line" | sed -n 's/^[[:space:]]*\([^[:space:]]*\).*/\1/p')
            [ -z "$LIBNAME" ] && continue
            MATCH=0
            for allowed in "${ALLOWED_SYSTEM_LIBS[@]}"; do
              if [ "$LIBNAME" = "$allowed" ]; then
                MATCH=1
                break
              fi
            done
            if [ "$MATCH" -eq 0 ]; then
              UNEXPECTED+=("$LIBNAME")
            fi
          done < /tmp/m3u-tv-ldd.txt
          if [ "${#UNEXPECTED[@]}" -gt 0 ]; then
            echo "ERROR: Unexpected system dependency not in ALLOWED_SYSTEM_LIBS: ${UNEXPECTED[*]}"
            echo "If this is an intentional new dependency, add it to the allowlist in this step."
            exit 1
          fi

      - name: Package as ZIP
        run: |
          V="${{ needs.validate.outputs.version }}"
          ZIP="m3u-tv-v${V}-linux.zip"
          BUNDLE="build/linux/x64/release/bundle"
          (cd "$BUNDLE" && python3 -m zipfile -c "$GITHUB_WORKSPACE/flutter_client/$ZIP" .)
          python3 -m zipfile -t "$ZIP"
          sha256sum "$ZIP" > "$ZIP.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: linux-zip
          path: |
            flutter_client/m3u-tv-v${{ needs.validate.outputs.version }}-linux.zip
            flutter_client/m3u-tv-v${{ needs.validate.outputs.version }}-linux.zip.sha256

  # ── Windows ───────────────────────────────────────────────────────────────
  #
  # The Windows target uses a custom libmpv backend (desktop_libmpv_backend.cpp)
  # and loads the libmpv-2.dll bundled by media_kit_libs_windows_video.
  # ─────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows ZIP
    runs-on: windows-latest
    needs: validate
    defaults:
      run:
        working-directory: flutter_client
    steps:
      - uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Set version
        run: |
          (Get-Content pubspec.yaml) `
            -replace '^version: .*', "version: ${{ needs.validate.outputs.version }}+${{ needs.validate.outputs.build_number }}" `
            | Set-Content pubspec.yaml

      - name: Build Windows app
        run: |
          flutter build windows --release `
            --dart-define=TRAKT_CLIENT_ID=${{ secrets.TRAKT_CLIENT_ID }} `
            --dart-define=TRAKT_CLIENT_SECRET=${{ secrets.TRAKT_CLIENT_SECRET }}

      - name: Verify Windows bundle
        run: |
          $Bundle = "build\windows\x64\runner\Release"
          $Required = @(
            "m3u_tv.exe",
            "flutter_windows.dll",
            "libmpv-2.dll",
            "data\icudtl.dat",
            "data\flutter_assets\AssetManifest.bin"
          )
          foreach ($RelativePath in $Required) {
            $Path = Join-Path $Bundle $RelativePath
            if (-not (Test-Path $Path -PathType Leaf)) {
              throw "Required Windows bundle file is missing: $Path"
            }
            if ((Get-Item $Path).Length -eq 0) {
              throw "Required Windows bundle file is empty: $Path"
            }
          }

      - name: Package as ZIP
        run: |
          $V = "${{ needs.validate.outputs.version }}"
          Compress-Archive `
            -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "m3u-tv-v${V}-windows.zip"

      - name: Verify Windows archive
        run: |
          $V = "${{ needs.validate.outputs.version }}"
          $Zip = "m3u-tv-v${V}-windows.zip"
          $VerifyDir = Join-Path $env:RUNNER_TEMP "m3u-tv-windows-verify"
          Expand-Archive -Path $Zip -DestinationPath $VerifyDir
          foreach ($RelativePath in @("m3u_tv.exe", "flutter_windows.dll", "libmpv-2.dll", "data\icudtl.dat")) {
            $Path = Join-Path $VerifyDir $RelativePath
            if (-not (Test-Path $Path -PathType Leaf)) {
              throw "Required archived Windows file is missing: $RelativePath"
            }
          }
          $Hash = (Get-FileHash -Algorithm SHA256 $Zip).Hash.ToLowerInvariant()
          "$Hash  $Zip" | Set-Content "$Zip.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: windows-zip
          path: |
            flutter_client/m3u-tv-v${{ needs.validate.outputs.version }}-windows.zip
            flutter_client/m3u-tv-v${{ needs.validate.outputs.version }}-windows.zip.sha256

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.desktop_artifacts_only != true }}
    runs-on: ubuntu-latest
    needs:
      - validate
      - build-android
      - build-linux
      - build-windows
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download Android APK
        uses: actions/download-artifact@v8
        with:
          name: android-apk
          path: artifacts/android-apks/

      - name: Download Linux ZIP
        uses: actions/download-artifact@v8
        with:
          name: linux-zip
          path: artifacts/linux-zips/

      - name: Download Windows ZIP
        uses: actions/download-artifact@v8
        with:
          name: windows-zip
          path: artifacts/windows-zips/

      - name: Verify non-Apple assets
        run: |
          set -euo pipefail
          V="${{ needs.validate.outputs.version }}"
          for asset in \
            "artifacts/android-apks/m3u-tv-v${V}-android.apk" \
            "artifacts/linux-zips/m3u-tv-v${V}-linux.zip" \
            "artifacts/windows-zips/m3u-tv-v${V}-windows.zip"; do
            test -s "$asset"
            test -s "$asset.sha256"
            (cd "$(dirname "$asset")" && sha256sum -c "$(basename "$asset").sha256")
          done

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v${{ needs.validate.outputs.version }}"
          PREV_TAG="${{ needs.validate.outputs.prev_tag }}"
          PREV_FLAG=""
          if [ -n "$PREV_TAG" ]; then
            PREV_FLAG="--notes-start-tag $PREV_TAG"
          fi

          V="${{ needs.validate.outputs.version }}"
          ASSETS=(
            "artifacts/android-apks/m3u-tv-v${V}-android.apk"
            "artifacts/android-apks/m3u-tv-v${V}-android.apk.sha256"
          )

          if gh release view "$TAG" > /dev/null 2>&1; then
            EXISTING_ASSETS=$(gh release view "$TAG" --json assets --jq '.assets[].name')
            for blocked_asset in \
              "m3u-tv-v${V}-linux.zip" \
              "m3u-tv-v${V}-linux.zip.sha256" \
              "m3u-tv-v${V}-linux.tar.gz" \
              "m3u-tv-v${V}-linux.tar.gz.sha256" \
              "m3u-tv-v${V}-windows.zip" \
              "m3u-tv-v${V}-windows.zip.sha256"; do
              if grep -Fxq "$blocked_asset" <<< "$EXISTING_ASSETS"; then
                gh release delete-asset "$TAG" "$blocked_asset" --yes
              fi
            done
            gh release edit "$TAG" --title "$TAG"
            gh release upload "$TAG" --clobber "${ASSETS[@]}"
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              $PREV_FLAG \
              "${ASSETS[@]}"
          fi

      - name: Release summary
        run: |
          V="v${{ needs.validate.outputs.version }}"
          echo "## Release Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** $V | **Build:** ${{ needs.validate.outputs.build_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Artifact |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Android + Android TV | \`m3u-tv-${V}-android.apk\` |" >> $GITHUB_STEP_SUMMARY

  # ── Apple Release ─────────────────────────────────────────────────────────
  release-apple:
    name: Create GitHub Release (Apple)
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.desktop_artifacts_only != true }}
    runs-on: ubuntu-latest
    needs:
      - validate
      - release
      - build-ios
      - build-tvos
      - build-macos
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download iOS IPA
        uses: actions/download-artifact@v8
        with:
          name: ios-ipa
          path: artifacts/ios-ipas/

      - name: Download tvOS IPA
        uses: actions/download-artifact@v8
        with:
          name: tvos-ipa
          path: artifacts/tvos-ipas/

      - name: Download macOS DMG
        uses: actions/download-artifact@v8
        with:
          name: macos-dmg
          path: artifacts/macos-dmgs/

      - name: Verify Apple assets
        run: |
          set -euo pipefail
          V="${{ needs.validate.outputs.version }}"
          for asset in \
            "artifacts/ios-ipas/m3u-tv-v${V}-ios.ipa" \
            "artifacts/tvos-ipas/m3u-tv-v${V}-tvos.ipa" \
            "artifacts/macos-dmgs/m3u-tv-v${V}-macos.dmg"; do
            test -s "$asset"
            test -s "$asset.sha256"
            (cd "$(dirname "$asset")" && sha256sum -c "$(basename "$asset").sha256")
          done

      - name: Add Apple assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ needs.validate.outputs.version }}"
          ASSETS=(
            "artifacts/ios-ipas/m3u-tv-v${{ needs.validate.outputs.version }}-ios.ipa"
            "artifacts/tvos-ipas/m3u-tv-v${{ needs.validate.outputs.version }}-tvos.ipa"
            "artifacts/macos-dmgs/m3u-tv-v${{ needs.validate.outputs.version }}-macos.dmg"
            "artifacts/ios-ipas/m3u-tv-v${{ needs.validate.outputs.version }}-ios.ipa.sha256"
            "artifacts/tvos-ipas/m3u-tv-v${{ needs.validate.outputs.version }}-tvos.ipa.sha256"
            "artifacts/macos-dmgs/m3u-tv-v${{ needs.validate.outputs.version }}-macos.dmg.sha256"
          )

          gh release upload "$TAG" --clobber "${ASSETS[@]}"

      - name: Apple Release summary
        run: |
          V="v${{ needs.validate.outputs.version }}"
          echo "## Apple Release Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** $V | **Build:** ${{ needs.validate.outputs.build_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Artifact |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| iOS | \`m3u-tv-${V}-ios.ipa\` |" >> $GITHUB_STEP_SUMMARY
          echo "| tvOS | \`m3u-tv-${V}-tvos.ipa\` |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS | \`m3u-tv-${V}-macos.dmg\` |" >> $GITHUB_STEP_SUMMARY
