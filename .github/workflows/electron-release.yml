name: Electron Release

on:
  push:
    tags:
      - 'v*'        # trigger on version tags: v1.0.0, v1.2.3-beta, etc.
  workflow_dispatch:  # also allow manual runs from the GitHub UI

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # macOS — arm64 (Apple Silicon)
  # ──────────────────────────────────────────────────────────────────────────
  build-mac-arm64:
    runs-on: macos-latest   # GitHub's macos-latest is arm64 (M-series)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack yarn install --frozen-lockfile

      - name: Fetch mpv binaries (arm64)
        run: bash scripts/download-binaries.sh   # auto-detects arm64

      - name: Build Electron app (macOS arm64 DMG)
        run: corepack yarn electron:build -- --mac --arm64
        env:
          # Set CSC_LINK + CSC_KEY_PASSWORD secrets for signed builds.
          # Leave as-is for unsigned (Gatekeeper will warn on first launch).
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: m3u-tv-mac-arm64
          path: release/*.dmg

  # ──────────────────────────────────────────────────────────────────────────
  # macOS — x64 (Intel)
  # ──────────────────────────────────────────────────────────────────────────
  build-mac-x64:
    runs-on: macos-13       # macos-13 is the last Intel GitHub runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack yarn install --frozen-lockfile

      - name: Fetch mpv binaries (x64)
        run: bash scripts/download-binaries.sh   # auto-detects x64

      - name: Build Electron app (macOS x64 DMG)
        run: corepack yarn electron:build -- --mac --x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: m3u-tv-mac-x64
          path: release/*.dmg

  # ──────────────────────────────────────────────────────────────────────────
  # Windows — x64
  # ──────────────────────────────────────────────────────────────────────────
  build-win-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack yarn install --frozen-lockfile

      - name: Install p7zip (for mpv extraction)
        run: choco install 7zip -y

      - name: Fetch mpv binaries (Windows x64)
        run: bash scripts/download-binaries.sh
        shell: bash

      - name: Build Electron app (Windows NSIS installer + portable)
        run: corepack yarn electron:build -- --win --x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: m3u-tv-win-x64
          path: |
            release/*.exe
            release/*.msi

  # ──────────────────────────────────────────────────────────────────────────
  # Linux — x64 (AppImage + deb)
  # ──────────────────────────────────────────────────────────────────────────
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack yarn install --frozen-lockfile

      # Linux: no mpv bundling needed — users install via their package manager
      - name: Build Electron app (Linux AppImage + deb)
        run: corepack yarn electron:build -- --linux --x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: m3u-tv-linux-x64
          path: |
            release/*.AppImage
            release/*.deb

  # ──────────────────────────────────────────────────────────────────────────
  # Create GitHub Release (only on tag pushes, after all builds pass)
  # ──────────────────────────────────────────────────────────────────────────
  release:
    needs: [build-mac-arm64, build-mac-x64, build-win-x64, build-linux-x64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
