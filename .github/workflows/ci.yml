name: Flutter Client

on:
  pull_request:
    branches: [main, master, dev, flutter]
  push:
    branches: [main, master, dev, flutter]

concurrency:
  group: flutter-client-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-gates:
    name: Flutter analyze and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_client
    steps:
      - uses: actions/checkout@v7

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Provision pinned Flutter SDK path
        run: |
          if [ ! -x /tmp/flutter/bin/flutter ]; then
            git clone --depth 1 --branch stable https://github.com/flutter/flutter.git /tmp/flutter
          fi
          /tmp/flutter/bin/flutter --version

      - name: Get dependencies
        run: /tmp/flutter/bin/flutter pub get

      - name: Test native Android code
        run: ./android/gradlew -p android :app:testDebugUnitTest

      - name: Check formatting
        run: /tmp/flutter/bin/dart format --output=none --set-exit-if-changed .

      - name: Analyze Flutter client
        run: /tmp/flutter/bin/flutter analyze

      - name: Test Flutter client
        run: /tmp/flutter/bin/flutter test
