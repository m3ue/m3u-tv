name: m3u_tv
description: Flutter rewrite workspace for the M3U TV client.
publish_to: 'none'

version: 1.0.5+6

environment:
  sdk: ^3.12.0

dependencies:
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  dpad: ^3.0.0
  flutter:
    sdk: flutter
  flutter_cache_manager: ^3.3.0
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^10.3.1
  flutter_secure_storage_tvos:
    path: packages/flutter_secure_storage_tvos
  flutter_svg: ^2.3.0
  go_router: ^17.3.0
  intl: ^0.20.2
  media_kit: ^1.2.6
  media_kit_libs_ios_video: ^1.1.4
  media_kit_libs_linux: ^1.2.1
  media_kit_libs_macos_video: ^1.1.4
  media_kit_libs_windows_video: ^1.0.11
  media_kit_video: ^2.0.1
  path_provider: ^2.1.0
  path_provider_tvos: ^0.0.1
  qr_flutter: ^4.1.0
  timezone: ^0.10.0
  url_launcher: ^6.3.0
  web_socket_channel: ^3.0.0

dev_dependencies:
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.4
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mockito: ^5.4.4
  very_good_analysis: ^10.3.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/

