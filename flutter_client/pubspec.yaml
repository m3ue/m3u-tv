name: m3u_tv
description: Flutter rewrite workspace for the M3U TV client.
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.12.0

dependencies:
  cupertino_icons: ^1.0.8
  dpad: ^3.0.0
  flutter:
    sdk: flutter
  flutter_secure_storage: ^9.0.0
  flutter_secure_storage_tvos:
    path: packages/flutter_secure_storage_tvos
  flutter_svg: ^2.3.0
  media_kit: ^1.2.6
  media_kit_libs_ios_video: ^1.1.4
  media_kit_libs_linux: ^1.2.1
  media_kit_libs_macos_video: ^1.1.4
  media_kit_video: ^2.0.1
  path_provider: ^2.1.0
  path_provider_tvos: ^0.0.1

dev_dependencies:
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.4
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mockito: ^5.4.4
  very_good_analysis: ^10.3.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
