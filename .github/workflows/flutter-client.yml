name: Flutter Client

on:
  pull_request:
    branches: [main, master, dev]
  push:
    branches: [main, master, dev]

concurrency:
  group: flutter-client-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-gates:
    name: Flutter analyze and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_client
    steps:
      - uses: actions/checkout@v6

      - name: Provision pinned Flutter SDK path
        run: |
          if [ ! -x /tmp/flutter/bin/flutter ]; then
            git clone --depth 1 --branch stable https://github.com/flutter/flutter.git /tmp/flutter
          fi
          /tmp/flutter/bin/flutter --version

      - name: Analyze Flutter client
        run: /tmp/flutter/bin/flutter analyze

      - name: Test Flutter client
        run: /tmp/flutter/bin/flutter test
