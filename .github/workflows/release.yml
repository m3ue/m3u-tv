name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.3)'
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Gate: analyze, test, resolve version/prev-tag ─────────────────────────
  validate:
    name: Validate & Test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
      prev_tag: ${{ steps.version.outputs.prev_tag }}
    defaults:
      run:
        working-directory: flutter_client
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"
          BUILD_NUMBER="${{ github.run_number }}"
          PREV_TAG=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -v "^${TAG}$" \
            | head -1 || echo "")
          echo "version=$VERSION"           >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "prev_tag=$PREV_TAG"         >> $GITHUB_OUTPUT
          echo "Building v$VERSION (build $BUILD_NUMBER) — prev: ${PREV_TAG:-none}"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  # ── Android phone + Android TV (single APK, leanback optional) ────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: flutter_client
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Set version
        run: |
          sed -i "s/^version: .*/version: ${{ needs.validate.outputs.version }}+${{ needs.validate.outputs.build_number }}/" pubspec.yaml

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_B64" | base64 --decode > upload-keystore.jks

      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=TRAKT_CLIENT_ID=${{ secrets.TRAKT_CLIENT_ID }} \
            --dart-define=TRAKT_CLIENT_SECRET=${{ secrets.TRAKT_CLIENT_SECRET }}
        env:
          ANDROID_KEYSTORE_PATH: ../upload-keystore.jks
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Stage artifact
        run: cp build/app/outputs/flutter-apk/app-release.apk m3u-tv-v${{ needs.validate.outputs.version }}-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: flutter_client/m3u-tv-v${{ needs.validate.outputs.version }}-android.apk

  # ── iOS (unsigned IPA — sideload via AltStore / TestFlight with Apple certs) ──
  #
  # To enable signed distribution add secrets and uncomment the certificate
  # install step (same pattern as the tvOS job below).
  # ─────────────────────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    needs: validate
    defaults:
      run:
        working-directory: flutter_client
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Set version
        run: |
          sed -i '' "s/^version: .*/version: ${{ needs.validate.outputs.version }}+${{ needs.validate.outputs.build_number }}/" pubspec.yaml

      - name: Build iOS IPA (unsigned)
        run: |
          flutter build ipa --release --no-codesign \
            --dart-define=TRAKT_CLIENT_ID=${{ secrets.TRAKT_CLIENT_ID }} \
            --dart-define=TRAKT_CLIENT_SECRET=${{ secrets.TRAKT_CLIENT_SECRET }}

      - name: Stage artifact
        run: cp build/ios/ipa/*.ipa m3u-tv-v${{ needs.validate.outputs.version }}-ios.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: flutter_client/m3u-tv-v${{ needs.validate.outputs.version }}-ios.ipa

  # ── Apple TV / tvOS ───────────────────────────────────────────────────────
  #
  # The tvOS Xcode project uses manual copy-phases for Flutter artifacts
  # rather than the standard Flutter backend build phase, so CI pre-builds
  # the Flutter bundle and stages it before archiving with xcodebuild.
  #
  # To enable signed/TestFlight distribution uncomment the certificate step
  # below and add these secrets:
  #   APPLE_CERTIFICATE_BASE64       — p12 (base64)
  #   APPLE_CERTIFICATE_PASSWORD     — p12 password
  #   APPLE_PROVISIONING_PROFILE_B64 — .mobileprovision (base64)
  # ─────────────────────────────────────────────────────────────────────────
  build-tvos:
    name: Build tvOS IPA
    runs-on: macos-latest
    needs: validate
    defaults:
      run:
        working-directory: flutter_client
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Set version
        run: |
          sed -i '' "s/^version: .*/version: ${{ needs.validate.outputs.version }}+${{ needs.validate.outputs.build_number }}/" pubspec.yaml

      - name: Build Flutter bundle (Dart + assets)
        run: |
          flutter build bundle --release \
            --dart-define=TRAKT_CLIENT_ID=${{ secrets.TRAKT_CLIENT_ID }} \
            --dart-define=TRAKT_CLIENT_SECRET=${{ secrets.TRAKT_CLIENT_SECRET }}

      - name: Stage Flutter artifacts for Xcode
        run: |
          mkdir -p tvos/Flutter
          rsync -a --delete build/flutter_assets/ tvos/Flutter/flutter_assets/

      - name: Install CocoaPods dependencies
        run: |
          gem install xcpretty --no-document
          cd tvos && pod install --repo-update

      # Uncomment to enable signed builds:
      # - name: Install Apple certificate & provisioning profile
      #   env:
      #     CERT_B64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      #     CERT_PWD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      #     PROFILE_B64: ${{ secrets.APPLE_PROVISIONING_PROFILE_B64 }}
      #   run: |
      #     KC=$RUNNER_TEMP/build.keychain
      #     security create-keychain -p "" $KC
      #     security set-keychain-settings -lut 21600 $KC
      #     security unlock-keychain -p "" $KC
      #     echo "$CERT_B64" | base64 --decode -o $RUNNER_TEMP/cert.p12
      #     security import $RUNNER_TEMP/cert.p12 -P "$CERT_PWD" -A -t cert -f pkcs12 -k $KC
      #     security list-keychain -d user -s $KC
      #     PP=$RUNNER_TEMP/profile.mobileprovision
      #     echo "$PROFILE_B64" | base64 --decode -o "$PP"
      #     mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
      #     cp "$PP" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Archive (unsigned)
        run: |
          xcodebuild \
            -workspace tvos/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk appletvos \
            -archivePath build/tvos/Runner.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            FLUTTER_BUILD_NAME=${{ needs.validate.outputs.version }} \
            FLUTTER_BUILD_NUMBER=${{ needs.validate.outputs.build_number }} \
            | xcpretty

      - name: Package IPA
        run: |
          mkdir -p build/tvos/Payload
          cp -r "build/tvos/Runner.xcarchive/Products/Applications/Runner.app" build/tvos/Payload/
          cd build/tvos && zip -qr \
            "../../m3u-tv-v${{ needs.validate.outputs.version }}-tvos.ipa" Payload/

      - uses: actions/upload-artifact@v4
        with:
          name: tvos-ipa
          path: flutter_client/m3u-tv-v${{ needs.validate.outputs.version }}-tvos.ipa

  # ── macOS ─────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    needs: validate
    defaults:
      run:
        working-directory: flutter_client
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Set version
        run: |
          sed -i '' "s/^version: .*/version: ${{ needs.validate.outputs.version }}+${{ needs.validate.outputs.build_number }}/" pubspec.yaml

      - name: Install CocoaPods dependencies
        run: cd macos && pod install --repo-update

      - name: Build macOS app
        run: |
          flutter build macos --release \
            --dart-define=TRAKT_CLIENT_ID=${{ secrets.TRAKT_CLIENT_ID }} \
            --dart-define=TRAKT_CLIENT_SECRET=${{ secrets.TRAKT_CLIENT_SECRET }}

      - name: Package as DMG
        run: |
          hdiutil create \
            -volname "M3U TV" \
            -srcfolder "build/macos/Build/Products/Release/m3u_tv.app" \
            -ov -format UDZO \
            "m3u-tv-v${{ needs.validate.outputs.version }}-macos.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: flutter_client/m3u-tv-v${{ needs.validate.outputs.version }}-macos.dmg

  # ── Linux ─────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux tarball
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: flutter_client
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libmpv-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Set version
        run: |
          sed -i "s/^version: .*/version: ${{ needs.validate.outputs.version }}+${{ needs.validate.outputs.build_number }}/" pubspec.yaml

      - name: Build Linux app
        run: |
          flutter build linux --release \
            --dart-define=TRAKT_CLIENT_ID=${{ secrets.TRAKT_CLIENT_ID }} \
            --dart-define=TRAKT_CLIENT_SECRET=${{ secrets.TRAKT_CLIENT_SECRET }}

      - name: Package as tarball
        run: |
          tar -czf "m3u-tv-v${{ needs.validate.outputs.version }}-linux.tar.gz" \
            -C build/linux/x64/release/bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-tarball
          path: flutter_client/m3u-tv-v${{ needs.validate.outputs.version }}-linux.tar.gz

  # ── Windows ───────────────────────────────────────────────────────────────
  #
  # Note: the Windows target uses a custom libmpv backend (desktop_libmpv_backend.cpp).
  # The build output will not include libmpv.dll — users may need to install
  # the mpv runtime or bundle libmpv.dll separately for video playback.
  # ─────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows ZIP
    runs-on: windows-latest
    needs: validate
    defaults:
      run:
        working-directory: flutter_client
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Set version
        run: |
          (Get-Content pubspec.yaml) `
            -replace '^version: .*', "version: ${{ needs.validate.outputs.version }}+${{ needs.validate.outputs.build_number }}" `
            | Set-Content pubspec.yaml

      - name: Build Windows app
        run: |
          flutter build windows --release `
            --dart-define=TRAKT_CLIENT_ID=${{ secrets.TRAKT_CLIENT_ID }} `
            --dart-define=TRAKT_CLIENT_SECRET=${{ secrets.TRAKT_CLIENT_SECRET }}

      - name: Package as ZIP
        run: |
          $V = "${{ needs.validate.outputs.version }}"
          Compress-Archive `
            -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "m3u-tv-v${V}-windows.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: flutter_client/m3u-tv-v${{ needs.validate.outputs.version }}-windows.zip

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, build-android, build-ios, build-tvos, build-macos, build-linux, build-windows]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ needs.validate.outputs.version }}"
          PREV_TAG="${{ needs.validate.outputs.prev_tag }}"
          PREV_FLAG=""
          if [ -n "$PREV_TAG" ]; then
            PREV_FLAG="--notes-start-tag $PREV_TAG"
          fi

          if gh release view "$TAG" > /dev/null 2>&1; then
            # Release already exists (re-run) — update metadata and re-upload assets.
            gh release edit "$TAG" --title "$TAG"
            gh release upload "$TAG" \
              artifacts/*.apk \
              artifacts/*.ipa \
              artifacts/*.dmg \
              artifacts/*.tar.gz \
              artifacts/*.zip \
              --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              $PREV_FLAG \
              artifacts/*.apk \
              artifacts/*.ipa \
              artifacts/*.dmg \
              artifacts/*.tar.gz \
              artifacts/*.zip
          fi

      - name: Release summary
        run: |
          V="v${{ needs.validate.outputs.version }}"
          echo "## Release Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** $V | **Build:** ${{ needs.validate.outputs.build_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Artifact |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Android + Android TV | \`m3u-tv-${V}-android.apk\` |" >> $GITHUB_STEP_SUMMARY
          echo "| iOS | \`m3u-tv-${V}-ios.ipa\` |" >> $GITHUB_STEP_SUMMARY
          echo "| tvOS (Apple TV) | \`m3u-tv-${V}-tvos.ipa\` |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS | \`m3u-tv-${V}-macos.dmg\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux | \`m3u-tv-${V}-linux.tar.gz\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows | \`m3u-tv-${V}-windows.zip\` |" >> $GITHUB_STEP_SUMMARY
